apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  labels:
    app.kubernetes.io/name: oci-cost-optimizer
    app.kubernetes.io/component: backend-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oci-cost-optimizer
      app.kubernetes.io/component: backend-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oci-cost-optimizer
        app.kubernetes.io/component: backend-api
    spec:
      containers:
        - name: backend-api
          image: oci-cost-optimizer/backend-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8080"
            - name: APP_MODE
              value: "mock"
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  labels:
    app.kubernetes.io/name: oci-cost-optimizer
    app.kubernetes.io/component: backend-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: oci-cost-optimizer
    app.kubernetes.io/component: backend-api
  ports:
    - name: http
      port: 80
      targetPort: http
