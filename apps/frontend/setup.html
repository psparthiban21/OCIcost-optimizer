<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OCI Cost Optimizer Setup</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="setup-shell">
      <section class="panel setup-card">
        <div class="brand-mark">OC</div>
        <h1>Setup Mode</h1>
        <p class="setup-copy">Provide the path to the `.env` file you created. The app will load it and refresh setup status without a restart.</p>

        <form id="envFileForm" class="setup-form">
          <label for="envFilePath">Environment file path</label>
          <input id="envFilePath" name="envFilePath" placeholder="/app/.env or /config/.env" autocomplete="off" />
          <button type="submit">Load configuration</button>
        </form>

        <div class="setup-hint">
          <strong>Docker note:</strong> the path must exist inside the container. Mount a folder such as `./config:/config:ro`, then enter `/config/.env`.
        </div>

        <section id="setupResult" class="setup-result" hidden></section>
        <section id="setupChecks" class="setup-checks"></section>

        <p class="setup-links">
          <a href="/">Open dashboard</a>
          <a href="/api/setup">View setup JSON</a>
        </p>
      </section>
    </main>
    <script type="module" src="/setup.js"></script>
  </body>
</html>
